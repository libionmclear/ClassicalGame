<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEGEMON Prototype</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>HEGEMON Prototype</h1>
      <div class="controls">
        <label class="map-picker">
          Map
          <select id="map-size-select">
            <option value="italia">Italia (authored)</option>
            <option value="small">Small</option>
            <option value="medium" selected>Medium</option>
            <option value="large">Large</option>
            <option value="xl">XL</option>
          </select>
        </label>
        <label class="map-picker">
          Civs
          <select id="player-count-select">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>
        <button id="new-game-btn">New Game</button>
        <button id="end-turn-btn">End Turn</button>
        <button id="codex-btn" class="ghost-btn" title="Historical encyclopedia">📖 Codex</button>
      </div>
    </header>

    <section class="status-panel">
      <div id="status-line"></div>
      <div id="resource-bar" class="res-bar"></div>
      <div id="weather-bar" class="weather-bar"></div>
      <div id="hint-line">Your turn — click your city to build, or a unit to move it. Then End Turn.</div>
    </section>

    <section class="play-area">
      <div class="board-wrap">
        <div id="ranking" class="ranking"></div>
        <section id="board" class="board"></section>
        <div id="legend" class="legend"></div>
      </div>

      <aside class="control-panel">
        <h2 id="selection-line" class="selection-title">Nothing selected</h2>

        <div class="panel-group">
          <h3>Unit Actions</h3>
          <button id="found-city-btn">Found City</button>
        </div>

        <div class="panel-group">
          <h3>City Actions — Recruit</h3>
          <div id="build-menu" class="build-menu"></div>
        </div>

        <div class="panel-group">
          <h3>City Buildings</h3>
          <div id="building-menu" class="build-menu"></div>
        </div>

        <div class="panel-group">
          <h3>Research — Tree of Decisions</h3>
          <div id="tech-tree" class="tech-tree"></div>
        </div>
      </aside>
    </section>
  </main>

  <div id="result-modal" class="result-modal hidden">
    <div class="result-card">
      <h2 id="result-title">Victory</h2>
      <p id="result-body"></p>
      <button id="result-new-game-btn">Start New Scenario</button>
    </div>
  </div>

  <div id="event-modal" class="result-modal hidden">
    <div class="result-card event-card">
      <div class="event-tag">⚖️ Crossroads</div>
      <h2 id="event-title"></h2>
      <p id="event-situation" class="event-situation"></p>
      <div id="event-options" class="event-options"></div>
    </div>
  </div>

  <div id="codex-modal" class="result-modal hidden">
    <div class="result-card codex-card">
      <div class="codex-header">
        <h2>📖 Codex — the Classical World</h2>
        <button id="codex-close-btn" class="codex-close" title="Close">×</button>
      </div>
      <div id="codex-body" class="codex-body"></div>
    </div>
  </div>

  <script src="web/engine.bundle.js"></script>
  <script src="game.js"></script>
</body>
</html>
