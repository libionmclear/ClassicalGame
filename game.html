<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEGEMON Prototype</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>HEGEMON Prototype</h1>
      <div class="controls">
        <label class="map-picker">
          Map
          <select id="map-size-select">
            <option value="italia">Italia (authored)</option>
            <option value="small">Small</option>
            <option value="medium" selected>Medium</option>
            <option value="large">Large</option>
            <option value="xl">XL</option>
          </select>
        </label>
        <label class="map-picker">
          Civs
          <select id="player-count-select">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>
        <button id="new-game-btn">New Game</button>
        <button id="end-turn-btn">End Turn</button>
      </div>
    </header>

    <section class="status-panel">
      <div id="status-line"></div>
      <div id="victory-line"></div>
      <div id="resource-bar" class="res-bar"></div>
      <div id="weather-bar" class="weather-bar"></div>
      <div id="hint-line">Hint: Select your unit, then click a tile to move or attack.</div>
    </section>

    <section class="play-area">
      <div class="board-wrap">
        <section id="board" class="board"></section>
        <div id="legend" class="legend"></div>
      </div>

      <aside class="control-panel">
        <h2>Command Panel</h2>
        <div id="selection-line" class="selection-line">Nothing selected.</div>
        <button id="clear-selection-btn">Clear Selection</button>

        <div class="panel-group">
          <h3>Turn Checklist</h3>
          <div id="turn-checklist" class="turn-checklist"></div>
        </div>

        <div class="panel-group">
          <h3>Unit Actions</h3>
          <button id="found-city-btn">Found City</button>
        </div>

        <div class="panel-group">
          <h3>City Actions</h3>
          <button id="build-warrior-btn">Build Warrior</button>
          <button id="build-archer-btn">Build Archer</button>
          <button id="build-settler-btn">Build Settler</button>
        </div>

        <div class="panel-group">
          <h3>Research — Tree of Decisions</h3>
          <div id="tech-tree" class="tech-tree"></div>
        </div>

        <div class="panel-group">
          <h3>Action Log</h3>
          <div id="action-log" class="action-log"></div>
        </div>
      </aside>
    </section>
  </main>

  <div id="result-modal" class="result-modal hidden">
    <div class="result-card">
      <h2 id="result-title">Victory</h2>
      <p id="result-body"></p>
      <button id="result-new-game-btn">Start New Scenario</button>
    </div>
  </div>

  <script src="web/engine.bundle.js"></script>
  <script src="game.js"></script>
</body>
</html>
